name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel outdated runs (10%+ cost savings)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: mcp/package-lock.json

      - name: Install dependencies
        working-directory: mcp
        run: npm ci

      - name: Run tests
        working-directory: mcp
        run: npm test

      - name: Check coverage
        working-directory: mcp
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: matrix.node-version == 24
        uses: codecov/codecov-action@v4
        with:
          files: ./mcp/coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: mcp/package-lock.json

      - name: Install dependencies
        working-directory: mcp
        run: npm ci

      - name: Run linter (if configured)
        working-directory: mcp
        run: npm run lint --if-present

  package-validation:
    name: Validate Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: mcp/package-lock.json

      - name: Install dependencies
        working-directory: mcp
        run: npm ci

      - name: Validate package with npm pack
        working-directory: mcp
        run: npm pack --dry-run

      - name: Check package size
        working-directory: mcp
        run: |
          SIZE=$(npm pack --dry-run 2>&1 | grep "unpacked size" | awk '{print $4}')
          echo "Package size: $SIZE"
          # Fail if package is unexpectedly large (> 50kB)
          if [ "${SIZE%kB}" -gt 50 ]; then
            echo "::error::Package size exceeds 50kB limit"
            exit 1
          fi
